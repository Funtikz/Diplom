stages:
  - install
  - test
  - build
  - deploy

variables:
  NODE_ENV: production

install:
  stage: install
  script:
    - echo "Installing dependencies..."
    - npm install

test:
  stage: test
  script:
    - echo "Running tests..."
    - npm test

build:
  stage: build
  script:
    - echo "Building project..."
    - npm run build
  artifacts:
    paths:
      - dist/

deploy:
  stage: deploy
  script:
    - echo "Deploying application..."
    - ./deploy.sh
  only:
    - main